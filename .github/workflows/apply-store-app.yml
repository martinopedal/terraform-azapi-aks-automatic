name: "Apply Store App Manifests"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - prod

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}

jobs:
  apply-manifests:
    name: Apply Store App Manifests
    runs-on: [self-hosted, linux, demo-private, sub9]
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}

      - name: Install kubectl
        run: |
          if ! command -v kubectl &> /dev/null; then
            echo "Installing kubectl..."
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi
          kubectl version --client

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-sreagt-dmo-swc-001 \
            --name aks-sreagt-store-dmo-swc-001 \
            --overwrite-existing \
            --admin

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Apply manifests
        run: |
          kubectl apply -k manifests/
          echo "Manifests applied successfully"

      - name: Wait for resources
        run: |
          echo "Waiting for deployment to be ready..."
          kubectl wait --for=condition=available --timeout=300s deployment/store-app -n store-app || true
          
          echo "Checking deployment status..."
          kubectl get deployment -n store-app
          kubectl get pods -n store-app
          kubectl get service -n store-app
          
          echo "Checking Gateway status..."
          kubectl get gateway -n store-app
          kubectl describe gateway store-app-gateway -n store-app || true
          
          echo "Checking HTTPRoute status..."
          kubectl get httproute -n store-app
          kubectl describe httproute store-app-route -n store-app || true

      - name: Get Gateway address
        run: |
          echo "Waiting for Gateway to get an address..."
          for i in {1..30}; do
            ADDRESS=$(kubectl get gateway store-app-gateway -n store-app -o jsonpath='{.status.addresses[0].value}' 2>/dev/null || echo "")
            if [ -n "$ADDRESS" ]; then
              echo "Gateway address: $ADDRESS"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          
          echo "Final Gateway status:"
          kubectl get gateway store-app-gateway -n store-app -o yaml || true
