name: "Deploy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - prod
      apply:
        description: "Apply the saved plan after planning"
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}
  TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: [self-hosted, linux, demo-private, sub9]
    environment: ${{ inputs.environment }}
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "~1.9"

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_NAME }}" \
            -backend-config="key=aks-automatic-${{ inputs.environment }}.tfstate" \
            -backend-config="subscription_id=${{ vars.TFSTATE_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Import existing AGC resources if present
        run: |
          terraform import -var-file="env/${{ inputs.environment }}.tfvars" 'azapi_resource.agc[0]' "/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}/resourceGroups/rg-sreagt-dmo-swc-001/providers/Microsoft.ServiceNetworking/trafficControllers/aks-sreagt-store-dmo-swc-001-agc" || true
          terraform import -var-file="env/${{ inputs.environment }}.tfvars" 'azapi_resource.agc_frontend[0]' "/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}/resourceGroups/rg-sreagt-dmo-swc-001/providers/Microsoft.ServiceNetworking/trafficControllers/aks-sreagt-store-dmo-swc-001-agc/frontends/frontend" || true
          terraform import -var-file="env/${{ inputs.environment }}.tfvars" 'azapi_resource.agc_association[0]' "/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}/resourceGroups/rg-sreagt-dmo-swc-001/providers/Microsoft.ServiceNetworking/trafficControllers/aks-sreagt-store-dmo-swc-001-agc/associations/association" || true

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -var-file="env/${{ inputs.environment }}.tfvars" -out=tfplan -detailed-exitcode
        continue-on-error: true

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "::error::Terraform plan failed with errors"
          exit 1

      - name: Upload Plan
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: tfplan-${{ inputs.environment }}
          path: tfplan

  apply:
    name: Terraform Apply
    needs: plan
    if: inputs.apply && needs.plan.outputs.plan_exit_code == '2'
    runs-on: [self-hosted, linux, demo-private, sub9]
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "~1.9"

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}

      - name: Download Plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: tfplan-${{ inputs.environment }}

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_NAME }}" \
            -backend-config="key=aks-automatic-${{ inputs.environment }}.tfstate" \
            -backend-config="subscription_id=${{ vars.TFSTATE_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

  apply-manifests:
    name: Apply Store App Manifests
    needs: apply
    if: inputs.apply && needs.plan.outputs.plan_exit_code == '2'
    # CRITICAL: Private API Server VNet Integration Constraint
    # 
    # The cluster API server (10.16.0.132) is ONLY reachable from the AKS node subnet
    # (snet-aks-nodes, 10.16.0.192/26) due to VNet Integration private cluster config.
    # Consumption ACA runners (demo-private, sub9) and other non-node-subnet compute
    # CANNOT reach the API server and will time out on kubectl commands.
    # 
    # REQUIRED FIX: Run in-cluster kubectl steps from node-subnet compute:
    #   Option A: Self-hosted runner VM/VMSS deployed INTO snet-aks-nodes
    #   Option B: Kubernetes Job deployed into the cluster (runs on node subnet by definition)
    #   Option C: Azure Container Instances with VNet integration on snet-aks-nodes
    #
    # CURRENT STATE: Runs on [self-hosted, linux, demo-private, sub9] which is NOT
    # in the node subnet and CANNOT reach the private API server. This job will FAIL
    # with connection timeout errors until the runner placement is corrected.
    #
    # See docs/private-api-access.md for detailed architecture and remediation steps.
    runs-on: [self-hosted, linux, demo-private, sub9]  # ⚠️ WRONG - cannot reach private API
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}

      - name: Install kubectl and kubelogin
        run: |
          # Install kubectl if not present
          if ! command -v kubectl &> /dev/null; then
            echo "Installing kubectl..."
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi
          kubectl version --client
          
          # Install kubelogin if not present
          if ! command -v kubelogin &> /dev/null; then
            echo "Installing kubelogin..."
            curl -LO "https://github.com/Azure/kubelogin/releases/download/v0.1.5/kubelogin-linux-amd64.zip"
            unzip kubelogin-linux-amd64.zip
            chmod +x bin/linux_amd64/kubelogin
            sudo mv bin/linux_amd64/kubelogin /usr/local/bin/
            rm -rf bin kubelogin-linux-amd64.zip
          fi
          kubelogin --version

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-sreagt-dmo-swc-001 \
            --name aks-sreagt-store-dmo-swc-001 \
            --overwrite-existing

      - name: Convert kubeconfig to use kubelogin
        run: |
          kubelogin convert-kubeconfig -l azurecli

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Apply manifests
        run: |
          kubectl apply -k manifests/
          echo "Manifests applied successfully"

      - name: Wait for resources
        run: |
          echo "Waiting for deployment to be ready..."
          kubectl wait --for=condition=available --timeout=300s deployment/store-app -n store-app || true
          
          echo "Checking deployment status..."
          kubectl get deployment,pod,service -n store-app
          
          echo "Checking Gateway status..."
          kubectl get gateway -n store-app
          kubectl describe gateway store-app-gateway -n store-app || true
          
          echo "Checking HTTPRoute status..."
          kubectl get httproute -n store-app
          kubectl describe httproute store-app-route -n store-app || true

      - name: Get Gateway address
        run: |
          echo "Waiting for Gateway to get an address..."
          for i in {1..30}; do
            ADDRESS=$(kubectl get gateway store-app-gateway -n store-app -o jsonpath='{.status.addresses[0].value}' 2>/dev/null || echo "")
            if [ -n "$ADDRESS" ]; then
              echo "Gateway address: $ADDRESS"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          
          echo "Final Gateway status:"
          kubectl get gateway store-app-gateway -n store-app -o yaml || true

