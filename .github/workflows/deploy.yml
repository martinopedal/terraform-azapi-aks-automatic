name: "Deploy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - prod
      apply:
        description: "Apply the saved plan after planning"
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}
  TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: [self-hosted, linux, demo-private, sub9]
    environment: ${{ inputs.environment }}
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: "~1.9"

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_NAME }}" \
            -backend-config="key=aks-automatic-${{ inputs.environment }}.tfstate" \
            -backend-config="subscription_id=${{ vars.TFSTATE_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Import existing AGC resources if present
        run: |
          terraform import -var-file="env/${{ inputs.environment }}.tfvars" 'azapi_resource.agc[0]' "/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}/resourceGroups/rg-sreagt-dmo-swc-001/providers/Microsoft.ServiceNetworking/trafficControllers/aks-sreagt-store-dmo-swc-001-agc" || true
          terraform import -var-file="env/${{ inputs.environment }}.tfvars" 'azapi_resource.agc_frontend[0]' "/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}/resourceGroups/rg-sreagt-dmo-swc-001/providers/Microsoft.ServiceNetworking/trafficControllers/aks-sreagt-store-dmo-swc-001-agc/frontends/frontend" || true
          terraform import -var-file="env/${{ inputs.environment }}.tfvars" 'azapi_resource.agc_association[0]' "/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}/resourceGroups/rg-sreagt-dmo-swc-001/providers/Microsoft.ServiceNetworking/trafficControllers/aks-sreagt-store-dmo-swc-001-agc/associations/association" || true

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -var-file="env/${{ inputs.environment }}.tfvars" -out=tfplan -detailed-exitcode
        continue-on-error: true

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "::error::Terraform plan failed with errors"
          exit 1

      - name: Upload Plan
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: tfplan-${{ inputs.environment }}
          path: tfplan

  apply:
    name: Terraform Apply
    needs: plan
    if: inputs.apply && needs.plan.outputs.plan_exit_code == '2'
    runs-on: [self-hosted, linux, demo-private, sub9]
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: "~1.9"

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEMO }}

      - name: Download Plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: tfplan-${{ inputs.environment }}

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_NAME }}" \
            -backend-config="key=aks-automatic-${{ inputs.environment }}.tfstate" \
            -backend-config="subscription_id=${{ vars.TFSTATE_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan
