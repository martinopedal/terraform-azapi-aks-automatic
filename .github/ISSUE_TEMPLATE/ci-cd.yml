name: CI/CD improvement
description: Request a CI/CD workflow change, pipeline fix, or automation improvement.
labels: ["ci-cd", "squad"]
body:
  - type: markdown
    attributes:
      value: |
        **Recommended squad:** `terraform-validator` (`terraform_validate_full`)
        Runs terraform validate + fmt, checks variable validation and lifecycle coverage.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What CI/CD workflow change or automation improvement is needed?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: CI/CD area
      options:
        - PR validation workflow
        - Deployment pipeline
        - Copilot coding agent setup
        - Squad dispatch
        - Scheduled automation
        - Other
    validations:
      required: true
