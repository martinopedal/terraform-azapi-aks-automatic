name: Documentation update
description: Report a documentation gap, inaccuracy, or improvement.
labels: ["documentation", "squad"]
body:
  - type: markdown
    attributes:
      value: |
        **Recommended squad:** `doc-checker` (`doc_check`)
        Cross-references README claims against actual code, checks Learn links and project structure.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What documentation issue needs to be addressed?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Documentation area
      options:
        - README accuracy
        - Architecture diagram
        - Variable or output descriptions
        - Microsoft Learn links
        - ALZ integration guidance
        - Day-2 operations
        - Other
    validations:
      required: true
