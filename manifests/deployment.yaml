apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-app
  namespace: store-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: store-app
  template:
    metadata:
      labels:
        app: store-app
    spec:
      # CRITICAL: hostNetwork: true bypasses Azure CNI Overlay pod IPs and runs
      # pods on node IPs (10.16.0.x), which are VNET-routable for AGC backends.
      # AGC ALB controller cannot forward data-plane traffic to overlay pod IPs
      # (10.244.x) even though health probes work. This is a workaround for an
      # AGC data-plane bug (BYO mode + Gateway API v1 + AKS Automatic).
      hostNetwork: true
      containers:
        - name: nginx
          # nginx-unprivileged runs as user 101 (nginx), not root.
          # Standard nginx image requires root and will fail with runAsUser 101.
          image: crsreagtdmoswc001.azurecr.io/store-nginx:1.22
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            runAsUser: 101
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
